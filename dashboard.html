<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">
<div class="container">

<a class="navbar-brand">MyBank</a>

<div>
<span class="text-white me-3" id="username">John Smith</span>
<button class="btn btn-light btn-sm" id="logoutBtn">Logout</button>
</div>

</div>
</nav>

<div class="container mt-4">

<div class="card shadow">
<div class="card-body">

<h3>Current Balance</h3>
<h1 id="balance">R0.00</h1>

<div class="mt-4">
<button class="btn btn-success" onclick="depositMoney()">Deposit</button>
<button class="btn btn-danger" onclick="withdrawMoney()">Withdraw</button>
<button class="btn btn-primary" onclick="transferMoney()">Transfer</button>
</div>

</div>
</div>

<div class="row mt-4">

<div class="col-md-6">
<div class="card shadow">
<div class="card-body">

<h4>Account Information</h4>
<hr>
<p><strong>Account Number:</strong> <span id="accountNumber"></span></p>
<p><strong>Account Type:</strong> Savings</p>
<p><strong>Status:</strong> Active</p>

</div>
</div>
</div>

<div class="col-md-6">
<div class="card shadow">
<div class="card-body">

<h4>Recent Transactions</h4>

<table class="table">
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="transactionTable">
</tbody>
</table>

</div>
</div>
</div>

</div>
</div>

<script src="dashboard.js"></script>

</body>
</html>
